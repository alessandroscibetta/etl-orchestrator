name: Pipeline C

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 70
    steps:
      - name: Wait for data
        run: |
          DATE=$(date -u +%Y%m%d)
          URL="https://noaa-gefs-pds.s3.amazonaws.com/gefs.${DATE}/12/atmos/pgrb2ap5/geavg.t12z.pgrb2a.0p50.f006"
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --head "$URL")
            if [ "$STATUS" = "200" ]; then
              echo "Ready"
              exit 0
            fi
            echo "Check $i/30 — not ready (${STATUS})"
            sleep 120
          done
          echo "Timeout"
          exit 1

      - name: Notify data available
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}&text=GEFS 12Z (noon UTC) data available — dispatching collector"

      - name: Dispatch
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.TARGET_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ secrets.TARGET_REPO }}/actions/workflows/snapshot-12z.yml/dispatches" \
            -d '{"ref":"main"}'
